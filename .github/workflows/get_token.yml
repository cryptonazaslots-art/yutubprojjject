name: Generar Token YouTube

on:
  workflow_dispatch:

jobs:
  get_token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth-oauthlib requests
      - run: |
          python - << 'EOF'
          import json, requests

          data = json.load(open('client_secret.json'))
          web = data.get('web') or data.get('installed')
          client_id = web['client_id']
          client_secret = web['client_secret']

          # Paso 1: pedir device code
          r = requests.post('https://oauth2.googleapis.com/device/code', data={
              'client_id': client_id,
              'scope': 'https://www.googleapis.com/auth/youtube.upload'
          })
          d = r.json()
          print(f"\n👉 Abrí esta URL: {d['verification_url']}")
          print(f"👉 Ingresá este código: {d['user_code']}")
          print(f"\nEsperando autorización (tenés {d['expires_in']}s)...")

          # Paso 2: polling hasta que autoricen
          import time
          interval = d.get('interval', 5)
          device_code = d['device_code']
          token = None
          for _ in range(60):
              time.sleep(interval)
              r2 = requests.post('https://oauth2.googleapis.com/token', data={
                  'client_id': client_id,
                  'client_secret': client_secret,
                  'device_code': device_code,
                  'grant_type': 'urn:ietf:params:oauth2:granttype:device_code'
              })
              t = r2.json()
              if 'access_token' in t:
                  token = t
                  break
              if t.get('error') not in ('authorization_pending', 'slow_down'):
                  print(f"Error: {t}")
                  break

          if token:
              print("\n=== COPIÁ ESTE JSON ===")
              print(json.dumps({
                  "token": token['access_token'],
                  "refresh_token": token.get('refresh_token',''),
                  "token_uri": "https://oauth2.googleapis.com/token",
                  "client_id": client_id,
                  "client_secret": client_secret,
                  "scopes": ["https://www.googleapis.com/auth/youtube.upload"],
                  "universe_domain": "googleapis.com",
                  "account": "",
                  "expiry": None
              }))
          EOF
