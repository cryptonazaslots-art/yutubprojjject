name: ViralEngine_V2
on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * *' # 20:30 Argentina

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests edge-tts google-api-python-client google-auth-oauthlib google-genai
      - name: Run Viral Engine
        env:
          GEMINI_API: ${{ secrets.GEMINI_API }}
          PEXELS_API: ${{ secrets.PEXELS_API }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
        run: python main.py
