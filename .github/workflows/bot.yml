name: ViralEngine_V6

on:
  workflow_dispatch:
    inputs:
      tema:
        description: 'Tema del video (ej: Séneca sobre el tiempo)'
        required: false
        default: 'aleatorio'
        type: string
  schedule:
    - cron: '0 12 * * *'   # 09:00 Argentina
    - cron: '0 18 * * *'   # 15:00 Argentina
    - cron: '30 23 * * *'  # 20:30 Argentina

jobs:
  publicar_short:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Instalar dependencias de Python
        run: |
          pip install --upgrade pip -q
          pip install requests edge-tts google-api-python-client google-auth-oauthlib google-genai -q

      - name: Ejecutar Viral Engine
        env:
          GEMINI_API: ${{ secrets.GEMINI_API }}
          PEXELS_API: ${{ secrets.PEXELS_API }}
          YT_TOKEN:   ${{ secrets.YT_TOKEN }}
        run: |
          TEMA="${{ github.event.inputs.tema }}"
          if [ "$TEMA" = "aleatorio" ] || [ -z "$TEMA" ]; then
            python main.py
          else
            python main.py "$TEMA"
          fi
